<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 客户背调器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#3b82f6', dark: '#2563eb' },
            surface: { DEFAULT: '#1e2130', card: '#252a3d', border: '#2e3450' },
          },
          animation: {
            'pulse-slow': 'pulse 2s cubic-bezier(0.4,0,0.6,1) infinite',
            'spin-slow': 'spin 1.5s linear infinite',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #161926; color: #e2e8f0; }
    .glass { background: rgba(37,42,61,0.85); backdrop-filter: blur(12px); }
    .gradient-border {
      position: relative;
      border-radius: 12px;
    }
    .gradient-border::before {
      content: '';
      position: absolute; inset: -1px;
      border-radius: 13px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
      z-index: -1;
    }
    .report-card { background: #1e2130; border: 1px solid #2e3450; border-radius: 12px; }
    .tag-low { background: #064e3b; color: #6ee7b7; }
    .tag-medium { background: #78350f; color: #fcd34d; }
    .tag-high { background: #7f1d1d; color: #fca5a5; }
    .star-fill { color: #f59e0b; }
    .star-empty { color: #374151; }
    /* PDF 打印样式 */
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; color: black !important; }
      .report-card { border: 1px solid #ccc !important; background: white !important; }
      .glass { background: white !important; }
      #report-container { display: block !important; }
    }
    /* 滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #161926; }
    ::-webkit-scrollbar-thumb { background: #2e3450; border-radius: 3px; }
    /* 打字光标 */
    .typing::after { content: '▌'; animation: blink 0.8s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    /* 进度步骤 */
    .step-done { background: #1d4ed8; }
    .step-active { background: #3b82f6; animation: pulse 1.5s infinite; }
    .step-pending { background: #374151; }
  </style>
</head>
<body class="min-h-screen font-sans">

  <!-- 顶部导航 -->
  <nav class="border-b border-surface-border glass sticky top-0 z-50 no-print">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-sm">🔍</div>
        <span class="font-bold text-lg text-white">AI 客户背调器</span>
        <span class="text-xs bg-blue-900 text-blue-300 px-2 py-0.5 rounded-full">Beta</span>
      </div>
      <div class="text-xs text-slate-500">Powered by DeepSeek + Serper</div>
    </div>
  </nav>

  <!-- 主体 -->
  <main class="max-w-5xl mx-auto px-4 py-8">

    <!-- Hero -->
    <div class="text-center mb-10 no-print">
      <h1 class="text-3xl md:text-4xl font-bold text-white mb-3">
        一键生成专业客户背调报告
      </h1>
      <p class="text-slate-400 text-base max-w-xl mx-auto">
        输入目标公司名称，AI 自动搜索全网信息，输出结构化的国际贸易情报分析报告
      </p>
    </div>

    <!-- 输入表单 -->
    <div class="gradient-border mb-8 no-print" id="form-card">
      <div class="glass rounded-xl p-6">
        <div class="grid md:grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">
              公司名称 <span class="text-red-400">*</span>
            </label>
            <input
              id="company-input"
              type="text"
              placeholder="例如：Walmart Inc."
              class="w-full bg-surface-card border border-surface-border rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">
              公司网站域名 <span class="text-slate-500 text-xs">（选填）</span>
            </label>
            <input
              id="domain-input"
              type="text"
              placeholder="例如：walmart.com"
              class="w-full bg-surface-card border border-surface-border rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"
            />
          </div>
        </div>
        <button
          id="start-btn"
          onclick="startInvestigation()"
          class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-semibold py-3.5 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 text-base"
        >
          <span id="btn-icon">🔍</span>
          <span id="btn-text">开始背调</span>
        </button>
      </div>
    </div>

    <!-- 进度面板 -->
    <div id="progress-panel" class="hidden mb-8 no-print">
      <div class="report-card p-6">
        <div class="flex items-center gap-3 mb-5">
          <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin-slow"></div>
          <span class="font-semibold text-white" id="progress-title">正在执行背调任务…</span>
        </div>
        <!-- 步骤指示器 -->
        <div id="steps-container" class="space-y-2 mb-4">
          <!-- 动态生成 -->
        </div>
        <!-- 当前状态 -->
        <div class="mt-4 text-sm text-slate-400 bg-surface-card rounded-lg px-4 py-3 min-h-[44px]" id="status-msg">
          初始化中…
        </div>
      </div>
    </div>

    <!-- 报告区域 -->
    <div id="report-container" class="hidden">

      <!-- 报告头部 -->
      <div class="report-card p-6 mb-4" id="report-header">
        <!-- 由 JS 填充 -->
      </div>

      <!-- 各模块卡片 -->
      <div id="report-sections" class="space-y-4"></div>

      <!-- 操作按钮 -->
      <div class="flex flex-wrap gap-3 mt-6 no-print">
        <button onclick="copyReport()" class="flex items-center gap-2 bg-surface-card hover:bg-surface-border border border-surface-border text-slate-300 hover:text-white px-5 py-2.5 rounded-lg transition text-sm font-medium">
          📋 复制报告文本
        </button>
        <button onclick="exportPDF()" class="flex items-center gap-2 bg-surface-card hover:bg-surface-border border border-surface-border text-slate-300 hover:text-white px-5 py-2.5 rounded-lg transition text-sm font-medium">
          📄 导出 PDF
        </button>
        <button onclick="resetForm()" class="flex items-center gap-2 bg-surface-card hover:bg-surface-border border border-surface-border text-slate-300 hover:text-white px-5 py-2.5 rounded-lg transition text-sm font-medium">
          🔄 重新背调
        </button>
      </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-panel" class="hidden mb-8">
      <div class="bg-red-900/30 border border-red-700 rounded-xl p-5">
        <div class="flex items-start gap-3">
          <span class="text-2xl">⚠️</span>
          <div>
            <p class="font-semibold text-red-300 mb-1">背调任务失败</p>
            <p class="text-sm text-red-400" id="error-msg"></p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Toast 提示 -->
  <div id="toast" class="fixed bottom-6 right-6 bg-green-700 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium hidden transition-all z-50">
    ✓ 已复制到剪贴板
  </div>

<script>
// ── 全局状态 ──────────────────────────────────────────────────────────────────
let currentReport = null;
const STEP_LABELS = [
  "第1轮搜索：公司基本概况",
  "第2轮搜索：进出口贸易",
  "第3轮搜索：评价与投诉",
  "第4轮搜索：社交媒体",
  "第5轮搜索：产品与行业",
  "AI 分析师生成报告",
];

// ── 主流程 ────────────────────────────────────────────────────────────────────
async function startInvestigation() {
  const company = document.getElementById("company-input").value.trim();
  const domain = document.getElementById("domain-input").value.trim();
  if (!company) {
    shakeInput("company-input");
    return;
  }

  // 重置 UI
  hideAll();
  showProgress();
  setButtonLoading(true);
  buildSteps();

  try {
    const resp = await fetch("/api/investigate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ company_name: company, domain }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      showError(err.error || "请求失败");
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let aiChunks = [];
    let collectingAI = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // 按 SSE 事件分割
      const events = buffer.split("\n\n");
      buffer = events.pop(); // 最后不完整的保留

      for (const raw of events) {
        if (!raw.trim()) continue;
        const eventMatch = raw.match(/^event: (\w+)\ndata: (.+)$/s);
        if (!eventMatch) continue;
        const [, event, dataStr] = eventMatch;
        let data;
        try { data = JSON.parse(dataStr); } catch { continue; }

        if (event === "progress") {
          updateProgress(data);
          if (data.phase === "ai") collectingAI = true;
        } else if (event === "chunk") {
          // AI 流式 token，可选：实时显示打字效果
          aiChunks.push(data.text);
          document.getElementById("status-msg").textContent =
            `AI 分析中… 已生成 ${aiChunks.join("").length} 字`;
        } else if (event === "done") {
          currentReport = data.report;
          renderReport(data.report);
          hideProgress();
          document.getElementById("report-container").classList.remove("hidden");
        } else if (event === "error") {
          showError(data.message + (data.raw ? `\n\nAI 原始输出：${data.raw}` : ""));
        }
      }
    }
  } catch (e) {
    showError("网络错误：" + e.message);
  } finally {
    setButtonLoading(false);
  }
}

// ── 进度 UI ───────────────────────────────────────────────────────────────────
function buildSteps() {
  const container = document.getElementById("steps-container");
  container.innerHTML = STEP_LABELS.map((label, i) => `
    <div id="step-${i}" class="flex items-center gap-3">
      <div id="step-dot-${i}" class="w-5 h-5 rounded-full step-pending flex-shrink-0 flex items-center justify-center text-xs text-white font-bold">
        ${i + 1}
      </div>
      <span id="step-label-${i}" class="text-sm text-slate-500">${label}</span>
    </div>
  `).join("");
}

function updateProgress(data) {
  const idx = data.step - 1;
  // 标记已完成步骤
  for (let i = 0; i < idx; i++) {
    const dot = document.getElementById(`step-dot-${i}`);
    const lbl = document.getElementById(`step-label-${i}`);
    if (dot) { dot.className = "w-5 h-5 rounded-full step-done flex-shrink-0 flex items-center justify-center text-xs text-white"; dot.textContent = "✓"; }
    if (lbl) lbl.className = "text-sm text-slate-400 line-through";
  }
  // 当前步骤
  const dot = document.getElementById(`step-dot-${idx}`);
  const lbl = document.getElementById(`step-label-${idx}`);
  if (dot) { dot.className = "w-5 h-5 rounded-full step-active flex-shrink-0 flex items-center justify-center text-xs text-white font-bold"; }
  if (lbl) lbl.className = "text-sm text-white font-medium";

  document.getElementById("status-msg").textContent = data.message;
}

// ── 报告渲染 ──────────────────────────────────────────────────────────────────
function renderReport(report) {
  // 头部
  const header = document.getElementById("report-header");
  const stars = renderStars(report.overall_rating || 3);
  header.innerHTML = `
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div>
        <div class="text-xs text-blue-400 font-medium mb-1 uppercase tracking-wider">客户背调报告</div>
        <h2 class="text-2xl font-bold text-white mb-1">${escHtml(report.company_name || "未知公司")}</h2>
        <div class="text-sm text-slate-400">报告日期：${escHtml(report.report_date || "—")}</div>
      </div>
      <div class="text-right">
        <div class="text-sm text-slate-400 mb-1">综合评级</div>
        <div class="text-xl">${stars}</div>
        <div class="text-sm font-medium text-white mt-0.5">${escHtml(report.overall_rating_label || "")}</div>
      </div>
    </div>
    ${report.executive_summary ? `
    <div class="mt-4 bg-blue-900/20 border border-blue-800/40 rounded-lg px-4 py-3 text-sm text-blue-100 leading-relaxed">
      <span class="font-semibold text-blue-300">执行摘要：</span>${escHtml(report.executive_summary)}
    </div>` : ""}
  `;

  // 各模块
  const sectionsEl = document.getElementById("report-sections");
  sectionsEl.innerHTML = "";
  for (const section of (report.sections || [])) {
    sectionsEl.appendChild(renderSection(section));
  }
}

function renderSection(section) {
  const card = document.createElement("div");
  card.className = "report-card overflow-hidden";

  // 风险徽章
  let riskBadge = "";
  if (section.risk_level) {
    const map = { low: ["tag-low", "低风险"], medium: ["tag-medium", "中等风险"], high: ["tag-high", "高风险"] };
    const [cls, label] = map[section.risk_level] || map.medium;
    riskBadge = `<span class="text-xs px-2 py-0.5 rounded-full ${cls} font-medium">${label}</span>`;
  }

  let header = `
    <div class="px-5 py-4 border-b border-surface-border flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <span class="text-lg">${section.icon || "📌"}</span>
        <h3 class="font-semibold text-white">${escHtml(section.title)}</h3>
      </div>
      ${riskBadge}
    </div>
  `;

  let body = `<div class="px-5 py-4 space-y-3">`;
  for (const item of (section.items || [])) {
    body += `
      <div class="flex gap-3">
        <span class="text-xs text-slate-500 font-medium min-w-[100px] pt-0.5 flex-shrink-0">${escHtml(item.label)}</span>
        <span class="text-sm text-slate-200 leading-relaxed flex-1">${escHtml(item.value || "暂无信息")}</span>
      </div>
    `;
  }
  body += `</div>`;

  card.innerHTML = header + body;
  return card;
}

function renderStars(n) {
  let s = "";
  for (let i = 1; i <= 5; i++) {
    s += `<span class="${i <= n ? "star-fill" : "star-empty"}">★</span>`;
  }
  return s;
}

// ── 操作按钮 ──────────────────────────────────────────────────────────────────
function copyReport() {
  if (!currentReport) return;
  const lines = [`【AI客户背调报告】`, `公司：${currentReport.company_name}`, `日期：${currentReport.report_date}`, `评级：${currentReport.overall_rating_label}`, ``, `执行摘要：${currentReport.executive_summary}`, ``];
  for (const s of (currentReport.sections || [])) {
    lines.push(s.title);
    for (const item of (s.items || [])) {
      lines.push(`  ${item.label}：${item.value}`);
    }
    lines.push("");
  }
  navigator.clipboard.writeText(lines.join("\n")).then(() => showToast());
}

function exportPDF() {
  document.querySelectorAll(".no-print").forEach(el => el.classList.add("hidden-for-print"));
  window.print();
  document.querySelectorAll(".no-print").forEach(el => el.classList.remove("hidden-for-print"));
}

function resetForm() {
  hideAll();
  document.getElementById("company-input").value = "";
  document.getElementById("domain-input").value = "";
  setButtonLoading(false);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ── 工具函数 ──────────────────────────────────────────────────────────────────
function showProgress() {
  document.getElementById("progress-panel").classList.remove("hidden");
}
function hideProgress() {
  document.getElementById("progress-panel").classList.add("hidden");
}
function hideAll() {
  document.getElementById("progress-panel").classList.add("hidden");
  document.getElementById("report-container").classList.add("hidden");
  document.getElementById("error-panel").classList.add("hidden");
}
function showError(msg) {
  hideProgress();
  setButtonLoading(false);
  document.getElementById("error-msg").textContent = msg;
  document.getElementById("error-panel").classList.remove("hidden");
}
function setButtonLoading(loading) {
  const btn = document.getElementById("start-btn");
  const icon = document.getElementById("btn-icon");
  const text = document.getElementById("btn-text");
  if (loading) {
    btn.disabled = true;
    btn.classList.add("opacity-70", "cursor-not-allowed");
    icon.textContent = "⏳";
    text.textContent = "背调中，请稍候…";
  } else {
    btn.disabled = false;
    btn.classList.remove("opacity-70", "cursor-not-allowed");
    icon.textContent = "🔍";
    text.textContent = "开始背调";
  }
}
function shakeInput(id) {
  const el = document.getElementById(id);
  el.classList.add("border-red-500", "ring-1", "ring-red-500");
  el.focus();
  setTimeout(() => el.classList.remove("border-red-500", "ring-1", "ring-red-500"), 2000);
}
function showToast() {
  const t = document.getElementById("toast");
  t.classList.remove("hidden");
  setTimeout(() => t.classList.add("hidden"), 2500);
}
function escHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// 回车触发
document.addEventListener("DOMContentLoaded", () => {
  ["company-input", "domain-input"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") startInvestigation();
    });
  });
});
</script>
</body>
</html>
